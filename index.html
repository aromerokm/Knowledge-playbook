<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowbler Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #eeeae3;
    --border: #ddd9d0;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --accent3: #059669;
    --warn: #d97706;
    --danger: #dc2626;
    --text: #1a1714;
    --muted: #78716c;
    --muted2: #57534e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b89a' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: rgba(245,243,239,0.94); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .topbar-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
  .topbar-badge { font-size:11px; font-weight:500; color:var(--accent3); background:rgba(5,150,105,0.08); border:1px solid rgba(5,150,105,0.2); padding:2px 10px; border-radius:100px; }
  .topbar-right { display:flex; gap:8px; }
  .top-btn { font-size:12px; font-weight:500; color:var(--muted); background:none; border:1px solid var(--border); padding:6px 14px; border-radius:100px; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
  .top-btn:hover { background:var(--surface); color:var(--text); }
  .top-btn.clear { color:var(--danger); border-color:rgba(220,38,38,0.2); }
  .top-btn.clear:hover { background:rgba(220,38,38,0.05); }

  .chat-area { position:relative; z-index:1; width:100%; max-width:700px; padding:80px 20px 210px; display:flex; flex-direction:column; gap:16px; }

  .bubble-wrap { display:flex; gap:10px; animation:bubbleIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
  .bubble-wrap.bot { align-items:flex-start; }
  .bubble-wrap.user { align-items:flex-start; flex-direction:row-reverse; }

  @keyframes bubbleIn { from{opacity:0;transform:translateY(10px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

  .avatar { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:2px; }
  .avatar-bot { background:none; overflow:hidden; border-radius:10px; }
  .avatar-user { background:none; overflow:hidden; border-radius:50%; }

  .bubble { max-width:86%; padding:14px 18px; border-radius:18px; font-size:14px; line-height:1.72; }
  .bubble.bot { background:var(--surface); border:1px solid var(--border); border-top-left-radius:4px; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .bubble.user { background:var(--accent); color:white; border-top-right-radius:4px; }
  .bubble strong { font-weight:600; }

  .step-list { list-style:none; margin-top:10px; display:flex; flex-direction:column; gap:9px; }
  .step-list li { display:flex; gap:10px; align-items:flex-start; font-size:13.5px; line-height:1.6; }

  .sn { min-width:22px; height:22px; border-radius:6px; background:rgba(37,99,235,0.08); border:1px solid rgba(37,99,235,0.15); color:var(--accent); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
  .sn.g { background:rgba(5,150,105,0.08); border-color:rgba(5,150,105,0.2); color:var(--accent3); }
  .sn.w { background:rgba(217,119,6,0.08); border-color:rgba(217,119,6,0.2); color:var(--warn); }
  .sn.r { background:rgba(220,38,38,0.08); border-color:rgba(220,38,38,0.2); color:var(--danger); }

  .tip-box  { margin-top:10px; padding:10px 14px; background:rgba(5,150,105,0.06);  border:1px solid rgba(5,150,105,0.15);  border-radius:10px; font-size:13px; color:var(--muted2); line-height:1.6; }
  .warn-box { margin-top:10px; padding:10px 14px; background:rgba(217,119,6,0.06);  border:1px solid rgba(217,119,6,0.15);  border-radius:10px; font-size:13px; color:var(--muted2); line-height:1.6; }
  .info-box { margin-top:10px; padding:10px 14px; background:rgba(37,99,235,0.05);  border:1px solid rgba(37,99,235,0.15);  border-radius:10px; font-size:13px; color:var(--muted2); line-height:1.6; }
  .role-box { margin-top:10px; padding:10px 14px; background:rgba(124,58,237,0.05); border:1px solid rgba(124,58,237,0.15); border-radius:10px; font-size:13px; color:var(--muted2); line-height:1.6; }

  .ui { display:inline-flex; align-items:center; gap:4px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1px 8px; font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; }
  .ui.green { background:rgba(5,150,105,0.08); border-color:rgba(5,150,105,0.2); color:var(--accent3); }
  .ui.blue  { background:rgba(37,99,235,0.08); border-color:rgba(37,99,235,0.2); color:var(--accent); }
  .ui.orange{ background:rgba(217,119,6,0.08); border-color:rgba(217,119,6,0.2); color:var(--warn); }

  .section-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin:14px 0 6px; }

  .typing { display:flex; gap:10px; align-items:center; animation:bubbleIn 0.3s ease both; }
  .typing-dots { background:var(--surface); border:1px solid var(--border); border-radius:18px; border-top-left-radius:4px; padding:14px 18px; display:flex; gap:5px; align-items:center; }
  .typing-dots span { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:typingDot 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes typingDot{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  .options-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(245,243,239,0.96); backdrop-filter:blur(16px); border-top:1px solid var(--border); padding:14px 20px 26px; display:flex; flex-direction:column; align-items:center; gap:10px; z-index:100; }
  .options-label { font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
  .options-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:660px; width:100%; }

  .opt-btn { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:9px 14px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); cursor:pointer; transition:all 0.18s; line-height:1.3; max-width:220px; text-align:center; }
  .opt-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(37,99,235,0.04); transform:translateY(-1px); box-shadow:0 4px 12px rgba(37,99,235,0.1); }
  .opt-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; box-shadow:none; }
  .opt-btn.primary { background:var(--accent); border-color:var(--accent); color:white; }
  .opt-btn.primary:hover { background:#1d4ed8; border-color:#1d4ed8; color:white; }

  .alink { color:var(--accent); font-weight:500; text-decoration:none; border-bottom:1px solid rgba(37,99,235,0.3); transition:border-color 0.2s; }
  .alink:hover { border-color:var(--accent); }

  .owners { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .owner-chip { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:100px; padding:4px 12px 4px 6px; font-size:12.5px; color:var(--muted2); }
  .ow-av { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:white; }
  .av-l { background:linear-gradient(135deg,#f59e0b,#ef4444); }
  .av-s { background:linear-gradient(135deg,#4f8eff,#7c5cfc); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">📘</div>
    <div class="topbar-title">Knowbler Playbook</div>
    <div class="topbar-badge">KEL Guide</div>
  </div>
  <div class="topbar-right">
    <button class="top-btn clear" onclick="clearAndRestart()">🗑 Clear & restart</button>
    <button class="top-btn" onclick="restart()">↩ Start over</button>
  </div>
</div>

<div class="chat-area" id="chat"></div>

<div class="options-bar">
  <div class="options-label">Choose an option</div>
  <div class="options-grid" id="optionsGrid"></div>
</div>

<script>
const flows = {

  start: {
    message: `👋 Hi! I'm your <strong>Knowbler guide</strong>.<br><br>Tell me what you need help with right now and I'll walk you through it step by step.`,
    options: [
      { label: "🔍 Search & attach an article to a case",    next: "search_intro" },
      { label: "✍️ Create a new knowledge article",          next: "create_intro" },
      { label: "✅ Review & publish an article (KEL/SSL)",   next: "approval_intro" },
      { label: "🔄 My article was rejected",                 next: "rejected" },
      { label: "📝 Add content / format an article",         next: "content_tips" },
      { label: "⚡ Not sure what I should do",               next: "decision" },
      { label: "🚨 I have a blocker or technical issue",     next: "blocker" },
    ]
  },

  // ── SEARCH & ATTACH ──────────────────────────────────────────────
  search_intro: {
    userLabel: "🔍 Search & attach an article to a case",
    message: `Knowbler lives inside Salesforce. You access it from the <strong>SUKnowbler tab</strong> inside any open case.<br><br>When you click that tab, Knowbler automatically surfaces articles related to your case based on the subject and product. No manual search needed to start.<br><br>What do you need help with?`,
    options: [
      { label: "📄 Results don't match my case",   next: "search_tips" },
      { label: "🔎 How to search with keywords",   next: "search_manual" },
      { label: "📎 How to attach an article",      next: "search_attach" },
      { label: "😕 No article found at all",       next: "search_none" },
    ]
  },

  search_tips: {
    userLabel: "📄 Results don't match my case",
    message: `The automatic results are based on your case subject and product. If they're off, it's usually because the description is too vague.<br><br><strong>Make sure the case includes:</strong>
      <ul class="step-list">
        <li><span class="sn g">✓</span>The <strong>main problem</strong> clearly stated</li>
        <li><span class="sn g">✓</span>The <strong>product, feature, or process</strong> involved</li>
        <li><span class="sn g">✓</span><strong>Specific errors, symptoms, or failed actions</strong></li>
        <li><span class="sn g">✓</span>Keywords agents would search for — no abbreviations</li>
      </ul>
      <div class="tip-box">💡 <strong>Strong:</strong> "Customer cannot replicate tickets in Apex. Data Replication is not updating new transactions."<br><br><strong>Too weak:</strong> "System issue. Please review."</div>`,
    options: [
      { label: "🔎 How to search with keywords",  next: "search_manual" },
      { label: "📎 Found one — how to attach",    next: "search_attach" },
      { label: "↩ Back to menu",                 next: "start" },
    ]
  },

  search_manual: {
    userLabel: "🔎 How to search with keywords",
    message: `Inside the SUKnowbler panel you'll see a toolbar at the top. Here's what each element does:<br><br>
      <ul class="step-list">
        <li><span class="sn">1</span><strong>🔸 Orange federated search icon</strong> — when highlighted, you're in the <strong>search console</strong> (auto-results from the case). Click it to toggle to the <strong>creation console</strong>, where you see All drafts, My drafts, and Published articles.</li>
        <li><span class="sn">2</span><strong>Search bar with ⭐</strong> — type keywords here for a more specific search: product name, error message, symptom, or action.</li>
        <li><span class="sn">3</span><strong>Hover over any article title</strong> — a content preview appears so you can confirm relevance before opening.</li>
        <li><span class="sn">4</span><strong>Tabs:</strong> <span class="ui">All Content</span> shows everything. <span class="ui">Salesforce Production</span> shows only articles from your SF instance.</li>
      </ul>
      <div class="tip-box">💡 In the creation console, there's a blue banner at the top — hover over the case number to check if an article has already been created for that case.</div>`,
    options: [
      { label: "📎 Found one — how to attach",  next: "search_attach" },
      { label: "😕 Still nothing relevant",     next: "search_none" },
      { label: "↩ Back to menu",               next: "start" },
    ]
  },

  search_attach: {
    userLabel: "📎 How to attach an article",
    message: `Each article in the search results has <strong>three icons on the right side</strong>:<br><br>
      <ul class="step-list">
        <li><span class="sn">📄</span><strong>Preview icon</strong> — opens a preview of the article content</li>
        <li><span class="sn">🔗</span><strong>Link icon</strong> — <strong>attaches the article directly to the active case</strong> with one click. Click again to detach if you made a mistake.</li>
        <li><span class="sn">🔖</span><strong>Bookmark icon</strong> — saves the article for later reference</li>
      </ul>
      <div class="tip-box">💡 If you attach by mistake, click the same link icon again — it will detach automatically.</div>
      <div class="info-box">ℹ️ Why attach matters: it connects knowledge to case resolution, improves resolution tracking, and keeps the repository healthy for reporting. Always attach if you used an article to solve a case.</div>`,
    options: [
      { label: "✅ Attached successfully",                    next: "done" },
      { label: "✍️ Need to create a new article instead",    next: "create_intro" },
      { label: "↩ Back to menu",                            next: "start" },
    ]
  },

  search_none: {
    userLabel: "😕 No article found at all",
    message: `If nothing relevant exists — <strong>don't stop the case resolution</strong>.<br><br>
      <ul class="step-list">
        <li><span class="sn w">1</span>Continue with your normal support steps and <strong>resolve the case first</strong>.</li>
        <li><span class="sn w">2</span>Write detailed resolution notes — these become the AI draft foundation.</li>
        <li><span class="sn w">3</span>Once fully resolved, create a new knowledge article from it.</li>
      </ul>
      <div class="warn-box">⚠️ Search supports your workflow but should never block it. Resolve first, capture knowledge after.</div>`,
    options: [
      { label: "✍️ Create a new article from this case",  next: "create_intro" },
      { label: "✅ Got it, continuing resolution",        next: "done" },
      { label: "↩ Back to menu",                        next: "start" },
    ]
  },

  // ── CREATE ARTICLE ────────────────────────────────────────────────
  create_intro: {
    userLabel: "✍️ Create a new knowledge article",
    message: `Before creating — <strong>confirm no existing article can be reused</strong>. Duplicate content creates noise in the repository.<br><br>Have you already searched and confirmed there's nothing relevant?`,
    options: [
      { label: "✅ Yes — confirmed, nothing exists",  next: "create_resolved" },
      { label: "🔍 Not yet — let me search first",   next: "search_intro" },
    ]
  },

  create_resolved: {
    userLabel: "✅ Yes — confirmed, nothing exists",
    message: `Is the case <strong>fully resolved</strong>? Articles should only be created from resolved cases — the resolution notes are the AI draft foundation.`,
    options: [
      { label: "✅ Yes, case is fully resolved",    next: "create_steps" },
      { label: "🔄 Not yet, still working on it",  next: "create_not_resolved" },
    ]
  },

  create_not_resolved: {
    userLabel: "🔄 Not yet, still working on it",
    message: `Resolve the case first, then come back.<br><br>While working on it, <strong>write detailed resolution notes</strong> — the AI uses them to build the draft:<br><br>
      <ul class="step-list">
        <li><span class="sn g">✓</span>The exact fix and steps taken</li>
        <li><span class="sn g">✓</span>Root cause and key findings</li>
        <li><span class="sn g">✓</span>Business impact</li>
        <li><span class="sn g">✓</span>Clear, factual language — no abbreviations</li>
      </ul>
      <div class="tip-box">💡 Strong notes = better AI draft = less rework. This saves you real time.</div>`,
    options: [{ label: "↩ I'll come back when resolved", next: "start" }]
  },

  create_steps: {
    userLabel: "✅ Yes, case is fully resolved",
    message: `Here's the full article creation process:<br><br>
      <ul class="step-list">
        <li><span class="sn">1</span>Inside the case, click the <strong>SUKnowbler</strong> tab. Then click the <strong>🖊 green pencil icon</strong> — this opens a New Article linked to the active case.</li>
        <li><span class="sn">2</span>Knowbler <strong>AI auto-generates a first draft</strong> from your case details and resolution notes. Wait a few seconds.</li>
        <li><span class="sn">3</span><strong>Review and complete all fields:</strong><br>
          <span style="display:block;margin-top:6px;padding-left:4px;color:var(--muted2);font-size:13px">
          · <strong>Title</strong> — confirm it clearly reflects the issue<br>
          · <strong>Product</strong> — auto-populated, verify it's correct<br>
          · <strong>Type</strong> — select the correct article type <em>manually</em> (e.g. Technical Article)<br>
          · <strong>Visible to Customer</strong> — leave <em>unchecked</em> for now<br>
          · <strong>URL Name</strong> — auto-generated, verify it makes sense
          </span>
        </li>
        <li><span class="sn">4</span><strong>Review content:</strong> Description (issue context) and Detail (solution steps). Refine for clarity. Add images, tables, or links using the Rich Text Editor.</li>
        <li><span class="sn">5</span>Set <strong>Audience</strong> — select the right target audience using the selection arrows.</li>
        <li><span class="sn">6</span>When ready: click the <strong>arrow next to <span class="ui green">Save as draft</span></strong> → select <span class="ui blue">Send for Approval</span>.</li>
      </ul>
      <div class="tip-box">💡 A green confirmation = submitted. The article enters the approval queue automatically.</div>
      <div class="warn-box">⚠️ <span class="ui">Save as draft</span> alone won't send it for approval. Find your draft later under <strong>My draft articles</strong> (click the 🔸 orange icon to get there).</div>`,
    options: [
      { label: "✅ Submitted successfully",               next: "done" },
      { label: "📝 How to add content / format it",       next: "content_tips" },
      { label: "⚠️ Wrong product or type assigned",       next: "create_fix" },
      { label: "🔄 Article was rejected after review",    next: "rejected" },
      { label: "🤔 Something else",                       next: "blocker" },
    ]
  },

  create_fix: {
    userLabel: "⚠️ Wrong product or type assigned",
    message: `Incorrect product routes the approval to the wrong reviewer — fix it before resubmitting.<br><br>
      <ul class="step-list">
        <li><span class="sn w">1</span>Click the <strong>🔸 orange federated search icon</strong> → go to the creation console.</li>
        <li><span class="sn w">2</span>Click <strong>My draft articles</strong> and find the article.</li>
        <li><span class="sn w">3</span>Click the <strong>⋯ three dots</strong> on the article card.</li>
        <li><span class="sn w">4</span>Select the right option based on your role:<br>
          <span style="display:block;margin-top:6px;padding-left:4px;color:var(--muted2);font-size:13px">
          · <strong>TSS1/2/3</strong> → <span class="ui">Edit Article</span><br>
          · <strong>T2 / SSL / KEL</strong> → <span class="ui">Manage in Salesforce</span>
          </span>
        </li>
        <li><span class="sn w">5</span>Correct the product and/or type, then resubmit.</li>
      </ul>
      <div class="role-box">🔐 Only T2, SSL, and KEL have access to <em>Manage in Salesforce</em>. TSS agents must always use <em>Edit Article</em>.</div>`,
    options: [
      { label: "✅ Fixed and resubmitting",                    next: "done" },
      { label: "📋 Still unsure — use the feedback form",     next: "form_submit" },
      { label: "↩ Back to menu",                             next: "start" },
    ]
  },

  // ── CONTENT TIPS ──────────────────────────────────────────────────
  content_tips: {
    userLabel: "📝 Add content / format an article",
    message: `Here's how to add rich content and keep article quality high.<br><br>What do you need help with?`,
    options: [
      { label: "📸 Adding images",                next: "content_images" },
      { label: "📐 Adding accordion sections",    next: "content_accordion" },
      { label: "🤖 Using InkSpark",              next: "content_inkspark" },
      { label: "✅ Content quality criteria",    next: "content_quality" },
      { label: "↩ Back to menu",                next: "start" },
    ]
  },

  content_images: {
    userLabel: "📸 Adding images",
    message: `<strong>Always use screenshots</strong> — do not upload images from your computer's file system.<br><br>
      <ul class="step-list">
        <li><span class="sn w">⚠️</span>Salesforce sometimes fails to display images uploaded directly from local files.</li>
        <li><span class="sn g">✓</span>Take a screenshot of whatever you need to show, then <strong>paste it directly</strong> into the article Rich Text Editor.</li>
        <li><span class="sn g">✓</span>This ensures the image renders correctly for all users.</li>
      </ul>
      <div class="warn-box">⚠️ If an image isn't showing in a published article, it was likely uploaded from a local file. Replace it with a screenshot paste.</div>`,
    options: [
      { label: "↩ Back to content tips",  next: "content_tips" },

function removeTyping() { const t = document.getElementById('typing-ind'); if (t) t.remove(); }

function setOptions(options) {
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `opt-btn${i === 0 ? ' primary' : ''}`;
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(opt);
    grid.appendChild(btn);
  });
}

async function selectOption(opt) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  await addBubble(opt.userLabel || opt.label, 'user');
  showTyping();
  await new Promise(r => setTimeout(r, 650));
  removeTyping();
  await goTo(opt.next);
}

async function goTo(nodeId) {
  const node = flows[nodeId];
  if (!node) return;
  await addBubble(node.message, 'bot');
  setOptions(node.options);
  setTimeout(() => {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
    chat.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 100);
}

function restart() {
  document.getElementById('chat').innerHTML = '';
  goTo('start');
}

function clearAndRestart() {
  document.getElementById('chat').innerHTML = '';
  document.getElementById('optionsGrid').innerHTML = '';
  setTimeout(() => goTo('start'), 300);
}

window.addEventListener('DOMContentLoaded', () => goTo('start'));
</script>
